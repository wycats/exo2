name: Exo Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  classify:
    name: Binary Artifacts Classifier
    runs-on: ubuntu-latest
    outputs:
      run_binaries: ${{ steps.classify.outputs.run_binaries }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether binary jobs are required
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          FORCE_PLATFORM_BUILDS: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-platform-builds') }}
        run: |
          set -euo pipefail

          run_binaries=false

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            run_binaries=true
          fi

          if [[ "${FORCE_PLATFORM_BUILDS}" == "true" ]]; then
            run_binaries=true
          fi

          if [[ "${EVENT_NAME}" == "pull_request" && "${run_binaries}" != "true" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"
            changed_files="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
            if grep -Eq '^(\.github/workflows/exo-binaries\.yml|Cargo\.lock|Cargo\.toml|crates/|plugins/exo/|scripts/dev/install-latest-exo-binaries\.sh|tools/exo/)' <<<"${changed_files}"; then
              run_binaries=true
            fi
          fi

          echo "run_binaries=${run_binaries}" >> "${GITHUB_OUTPUT}"

  lint:
    name: Lint installer
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.run_binaries == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check installer shell syntax
        run: bash -n scripts/dev/install-latest-exo-binaries.sh

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: classify
    if: needs.classify.outputs.run_binaries == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-22.04
          - label: macos-aarch64
            os: macos-15
          - label: macos-x86_64
            os: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.label }}-exo-binaries-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.label }}-exo-binaries-

      - name: Build exo and exo-mcp
        run: cargo build --locked -p exo --bins --release

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          exe_suffix=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            exe_suffix=".exe"
          fi

          cp "target/release/exo${exe_suffix}" "dist/exo${exe_suffix}"
          cp "target/release/exo-mcp${exe_suffix}" "dist/exo-mcp${exe_suffix}"

          python3 - <<'PY'
          import hashlib
          import json
          import os
          import platform
          from pathlib import Path

          def normalized_platform() -> str:
              system = platform.system().lower()
              if system == "darwin":
                  return "macos"
              if system == "linux":
                  return "linux"
              if system == "windows":
                  return "windows"
              return system

          def normalized_arch() -> str:
              machine = platform.machine().lower()
              if machine in {"amd64", "x86_64"}:
                  return "x86_64"
              if machine in {"arm64", "aarch64"}:
                  return "aarch64"
              return machine

          dist = Path("dist")
          binaries = sorted(
              path for path in dist.iterdir() if path.name.startswith(("exo", "exo-mcp"))
          )
          manifest_binaries = []
          checksum_lines = []

          for binary in binaries:
              digest = hashlib.sha256(binary.read_bytes()).hexdigest()
              manifest_binaries.append(
                  {
                      "name": binary.name,
                      "sha256": digest,
                      "size": binary.stat().st_size,
                  }
              )
              checksum_lines.append(f"{digest}  {binary.name}")

          (dist / "SHA256SUMS").write_text("\n".join(checksum_lines) + "\n")
          (dist / "manifest.json").write_text(
              json.dumps(
                  {
                      "kind": "exo.binary-artifact",
                      "git_sha": os.environ["GITHUB_SHA"],
                      "git_ref": os.environ["GITHUB_REF"],
                      "run_id": os.environ["GITHUB_RUN_ID"],
                      "runner_os": os.environ["RUNNER_OS"],
                      "platform": normalized_platform(),
                      "arch": normalized_arch(),
                      "binaries": manifest_binaries,
                      "install_hint": "scripts/dev/install-latest-exo-binaries.sh",
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n"
          )
          PY

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: exo-binaries-${{ matrix.label }}-${{ github.sha }}-${{ github.run_attempt }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  gate:
    name: Binary Artifacts Gate
    runs-on: ubuntu-latest
    needs: [classify, lint, build]
    if: always()
    steps:
      - name: Check binary artifact result
        shell: bash
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUN_BINARIES: ${{ needs.classify.outputs.run_binaries }}
        run: |
          set -euo pipefail

          if [[ "${CLASSIFY_RESULT}" != "success" ]]; then
            echo "Binary artifact classifier did not succeed: ${CLASSIFY_RESULT}"
            exit 1
          fi

          if [[ "${RUN_BINARIES}" != "true" ]]; then
            echo "Binary artifact jobs are not required for this ref."
            exit 0
          fi

          if [[ "${LINT_RESULT}" != "success" ]]; then
            echo "Lint installer did not succeed: ${LINT_RESULT}"
            exit 1
          fi

          if [[ "${BUILD_RESULT}" != "success" ]]; then
            echo "Binary build matrix did not succeed: ${BUILD_RESULT}"
            exit 1
          fi

          echo "Binary artifact jobs succeeded."
