name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  classify:
    name: Windows Compatibility Classifier
    runs-on: ubuntu-latest
    outputs:
      run_windows: ${{ steps.classify.outputs.run_windows }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether Windows compatibility is required
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          FORCE_PLATFORM_BUILDS: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-platform-builds') }}
        run: |
          set -euo pipefail

          run_windows=false

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            run_windows=true
          fi

          if [[ "${FORCE_PLATFORM_BUILDS}" == "true" ]]; then
            run_windows=true
          fi

          if [[ "${EVENT_NAME}" == "pull_request" && "${run_windows}" != "true" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"
            changed_files="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
            if grep -Eq '^(\.cargo/|\.github/workflows/windows-ci\.yml|Cargo\.lock|Cargo\.toml|crates/|tools/exo/|tools/exo-workspace/)' <<<"${changed_files}"; then
              run_windows=true
            fi
          fi

          echo "run_windows=${run_windows}" >> "${GITHUB_OUTPUT}"

  rust:
    name: Windows Rust
    runs-on: windows-latest
    needs: classify
    if: needs.classify.outputs.run_windows == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-windows-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-windows-ci-

      - name: Check exo-workspace helpers
        run: cargo check --locked -p exo-workspace --bins --keep-going

      - name: Check exo binaries
        run: cargo check --locked -p exo --bins --keep-going

      - name: Test exo-workspace helpers
        run: cargo test --locked -p exo-workspace --lib

      - name: Test daemon connect-or-spawn
        run: cargo test --locked -p exo --test daemon_connect_or_spawn test_ensure_daemon_spawns_and_connects -- --test-threads=1

      - name: Test sidecar daemon concurrency
        run: cargo test --locked -p exo --test run_task_daemon_safe -- --test-threads=1

      - name: Test sidecar Windows batches
        run: cargo test-sidecar-windows

  gate:
    name: Windows Compatibility Gate
    runs-on: ubuntu-latest
    needs: [classify, rust]
    if: always()
    steps:
      - name: Check Windows compatibility result
        shell: bash
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          RUN_WINDOWS: ${{ needs.classify.outputs.run_windows }}
        run: |
          set -euo pipefail

          if [[ "${CLASSIFY_RESULT}" != "success" ]]; then
            echo "Windows compatibility classifier did not succeed: ${CLASSIFY_RESULT}"
            exit 1
          fi

          if [[ "${RUN_WINDOWS}" != "true" ]]; then
            echo "Windows compatibility jobs are not required for this ref."
            exit 0
          fi

          if [[ "${RUST_RESULT}" != "success" ]]; then
            echo "Windows Rust did not succeed: ${RUST_RESULT}"
            exit 1
          fi

          echo "Windows compatibility jobs succeeded."
